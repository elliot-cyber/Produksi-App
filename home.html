<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Produksi App</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

</head>
<body>

<div class="container">

<h1>INPUT PRODUKSI</h1>

<input type="text" id="nama_leader" placeholder="Nama Leader">

<input type="text" id="nama_wip" placeholder="Nama Barang">

<input type="number" id="jumlah_pallet" placeholder="Jumlah Pallet">

<input type="number" id="jumlah_layer" placeholder="Layer / Pallet">

<input type="number" id="jumlah_case" placeholder="Case / Layer">

<input type="number" id="jumlah_item" placeholder="Item / Case">

<input type="number" id="harga_barang_item" placeholder="Harga Per Item">

<input type="number" id="harga_barang_case" placeholder="Harga Per Case">

<input type="number" id="jumlah_anggota" placeholder="Jumlah Team">

<button onclick="hitung()">HITUNG</button>

<button onclick="simpan()">SIMPAN</button>

<button onclick="hapus()">HAPUS</button>

<button onclick="historyPage()">HISTORY</button>

<div class="hasil" id="hasil"></div>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDBQl3YCjVSCp4ivzo0K7v9atmHMOXdVf4",
authDomain: "produksi-app.firebaseapp.com",
databaseURL: "https://produksi-app-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "produksi-app",
storageBucket: "produksi-app.firebasestorage.app",
messagingSenderId: "603637906295",
appId: "1:603637906295:web:ac13c6414cb0689943ff72",
measurementId: "G-74KWX5F9D0"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

let dataSimpan = {};

function formatTanggal(){

const bulan = [
"Januari","Februari","Maret",
"April","Mei","Juni",
"Juli","Agustus","September",
"Oktober","November","Desember"
];

let d = new Date();

return d.getDate() + "-" +
bulan[d.getMonth()] + "-" +
d.getFullYear();

}

function hitung(){

let pallet =
parseInt(document.getElementById("jumlah_pallet").value);

let layer =
parseInt(document.getElementById("jumlah_layer").value);

let cases =
parseInt(document.getElementById("jumlah_case").value);

let item =
parseInt(document.getElementById("jumlah_item").value);

let hargaItem =
document.getElementById("harga_barang_item").value;

let hargaCase =
document.getElementById("harga_barang_case").value;

let team =
parseInt(document.getElementById("jumlah_anggota").value);

let leader =
document.getElementById("nama_leader").value;

let barang =
document.getElementById("nama_wip").value;

let totalItem =
pallet * layer * cases * item;

let totalCase =
pallet * layer * cases;

let totalOutput = 0;

if(hargaItem != ""){

totalOutput =
totalItem * parseInt(hargaItem);

}else{

totalOutput =
totalCase * parseInt(hargaCase);

}

let hasilIndividu =
Math.floor(totalOutput / team);

let hasilText = `
<b>Timer:</b> ${formatTanggal()} <br><br>

<b>Nama Leader:</b> ${leader}<br><br>

<b>Nama Barang:</b> ${barang}<br><br>

<b>Jumlah Pallet:</b> ${pallet} Pallet<br><br>

<b>Jumlah Layer:</b> ${layer} Layer/Pallet<br><br>

<b>Jumlah Case:</b> ${cases} Case/Layer<br><br>

<b>Jumlah Item:</b> ${item} Item/Case<br><br>

<b>Total Produksi:</b> ${totalItem} Item<br><br>

<b>Total Semua Hasil:</b> Rp ${totalOutput.toLocaleString()}<br><br>

<b>Jumlah Team:</b> ${team} Orang<br><br>

<b>Hasil Individu:</b> Rp ${hasilIndividu.toLocaleString()} / Orang
`;

document.getElementById("hasil").innerHTML =
hasilText;

dataSimpan = {
tanggal: formatTanggal(),
leader: leader,
barang: barang,
pallet: pallet,
layer: layer,
cases: cases,
item: item,
harga_item: hargaItem,
harga_case: hargaCase,
team: team,
total_item: totalItem,
total_output: totalOutput,
hasil_individu: hasilIndividu
};

}

function simpan(){

if(Object.keys(dataSimpan).length == 0){
alert("HITUNG DULU");
return;
}

db.ref("production_history").push(dataSimpan);

alert("DATA TERSIMPAN");

document.getElementById("hasil").innerHTML = "";

hapus();

}

function hapus(){

document.querySelectorAll("input").forEach(input=>{
input.value = "";
});

}

function historyPage(){
location.href = "history.html";
}

</script>

</body>
</html>
