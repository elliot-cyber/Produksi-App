<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>History Produksi</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

</head>
<body>

<div class="container">

<h1>HISTORY PRODUKSI</h1>

<div id="historyList"></div>

<button onclick="location.href='home.html'">
KEMBALI
</button>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDBQl3YCjVSCp4ivzo0K7v9atmHMOXdVf4",
authDomain: "produksi-app.firebaseapp.com",
databaseURL: "https://produksi-app-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "produksi-app",
storageBucket: "produksi-app.firebasestorage.app",
messagingSenderId: "603637906295",
appId: "1:603637906295:web:ac13c6414cb0689943ff72",
measurementId: "G-74KWX5F9D0"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

const historyList =
document.getElementById("historyList");

db.ref("production_history")
.on("value", function(snapshot){

historyList.innerHTML = "";

snapshot.forEach(function(child){

let data = child.val();
let key = child.key;

historyList.innerHTML += `

<div class="card">

<p><b>Tanggal:</b> ${data.tanggal}</p>

<p><b>Leader:</b> ${data.leader}</p>

<p><b>Barang:</b> ${data.barang}</p>

<p><b>Total:</b> Rp ${data.total_output.toLocaleString()}</p>

<p><b>Individu:</b>
Rp ${data.hasil_individu.toLocaleString()}</p>

<button onclick="hapusData('${key}')">
HAPUS
</button>

</div>

`;

});

});

function hapusData(key){

db.ref("production_history/" + key).remove();

}

</script>

</body>
</html>
